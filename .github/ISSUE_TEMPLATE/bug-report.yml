name: Bug Report
description: Report a bug or unexpected behavior
title: "bug: "
labels: ["bug", "needs-triage", "byheaven-skills"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the unexpected behavior...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run the skill...
        2. Provide input...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Claude Code version, plugin version
      placeholder: |
        - OS: macOS 15.0
        - Claude Code: latest
        - Plugin version: 1.0.0
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste error messages or attach screenshots.
      render: shell
    validations:
      required: false
