# .github/workflows/release.yml
# Responsibility: Publish a GitHub Release from a manually curated plugin changelog.
# Triggered only by pushing a plugin release tag that points at a human-authored release commit.

name: Release

on:
  push:
    tags:
      - '*-*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Parse tag
        id: parse
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION=$(echo "$REF_NAME" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+$')
          if [[ -z "$VERSION" ]]; then
            echo "Tag must end with a semantic version: $REF_NAME" >&2
            exit 1
          fi

          COMPONENT="${REF_NAME%-$VERSION}"
          PLUGIN_DIR="plugins/$COMPONENT"
          MARKETPLACE_FILE=".claude-plugin/marketplace.json"
          CHANGELOG_FILE="$PLUGIN_DIR/CHANGELOG.md"

          if [[ ! -d "$PLUGIN_DIR" ]]; then
            echo "Plugin directory not found for tag $REF_NAME: $PLUGIN_DIR" >&2
            exit 1
          fi

          if [[ ! -f "$MARKETPLACE_FILE" ]]; then
            echo "Marketplace file not found: $MARKETPLACE_FILE" >&2
            exit 1
          fi

          if [[ ! -f "$CHANGELOG_FILE" ]]; then
            echo "Plugin changelog not found: $CHANGELOG_FILE" >&2
            exit 1
          fi

          echo "component=$COMPONENT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "marketplace_file=$MARKETPLACE_FILE" >> "$GITHUB_OUTPUT"
          echo "changelog_file=$CHANGELOG_FILE" >> "$GITHUB_OUTPUT"

      - name: Validate marketplace version
        env:
          EXPECTED_VERSION: ${{ steps.parse.outputs.version }}
          COMPONENT: ${{ steps.parse.outputs.component }}
          MARKETPLACE_FILE: ${{ steps.parse.outputs.marketplace_file }}
        run: |
          set -euo pipefail

          ACTUAL_VERSION=$(python3 - "$MARKETPLACE_FILE" "$COMPONENT" <<'PY'
          import json
          import sys

          marketplace_file, component = sys.argv[1:]
          plugins = json.load(open(marketplace_file, encoding="utf-8"))["plugins"]
          for plugin in plugins:
              if plugin["name"] == component:
                  version = plugin.get("version")
                  if not version:
                      raise SystemExit(
                          f"Plugin entry {component} has no version in {marketplace_file}"
                      )
                  print(version)
                  raise SystemExit(0)

          raise SystemExit(f"Plugin entry {component} not found in {marketplace_file}")
          PY
          )

          if [[ "$ACTUAL_VERSION" != "$EXPECTED_VERSION" ]]; then
            echo "Tag version $EXPECTED_VERSION does not match marketplace version $ACTUAL_VERSION" >&2
            exit 1
          fi

      - name: Extract release notes from CHANGELOG.md
        env:
          REF_NAME: ${{ github.ref_name }}
          CHANGELOG_FILE: ${{ steps.parse.outputs.changelog_file }}
        run: |
          chmod +x scripts/extract-release-notes.sh
          ./scripts/extract-release-notes.sh "$REF_NAME"

      - name: Read release title
        id: title
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ -s RELEASE_TITLE.txt ]]; then
            TITLE="${REF_NAME} - $(cat RELEASE_TITLE.txt)"
          else
            TITLE="${REF_NAME}"
          fi
          echo "name=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          TITLE: ${{ steps.title.outputs.name }}
        run: |
          set -euo pipefail

          if gh release view "$REF_NAME" >/dev/null 2>&1; then
            gh release edit "$REF_NAME" \
              --title "$TITLE" \
              --notes-file RELEASE_NOTES.md
          else
            gh release create "$REF_NAME" \
              --title "$TITLE" \
              --notes-file RELEASE_NOTES.md
          fi
