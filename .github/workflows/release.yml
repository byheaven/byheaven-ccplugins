# .github/workflows/release.yml
# Responsibility: Triggered by tag push (created by release-please after PR merge).
# Overwrites the auto-generated GitHub Release body with the human-edited CHANGELOG.md content.
# No publish step — this is a Claude plugin monorepo distributed via marketplace.

name: Release

on:
  push:
    tags:
      - '*-[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Parse plugin name and version from the tag (e.g. newproject-0.2.1)
      - name: Parse tag
        id: parse
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION=$(echo "$REF_NAME" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+$')
          COMPONENT="${REF_NAME%-$VERSION}"
          echo "component=$COMPONENT" >> "$GITHUB_OUTPUT"

      # Extract this version's section from the plugin's human-edited CHANGELOG.md
      - name: Extract release notes from CHANGELOG.md
        env:
          REF_NAME: ${{ github.ref_name }}
          CHANGELOG_FILE: plugins/${{ steps.parse.outputs.component }}/CHANGELOG.md
        run: |
          chmod +x scripts/extract-release-notes.sh
          ./scripts/extract-release-notes.sh "$REF_NAME"

      # Build the release title: "newproject-0.2.1 - Headline" or just the tag if no headline
      - name: Read release title
        id: title
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ -s RELEASE_TITLE.txt ]]; then
            TITLE="${REF_NAME} - $(cat RELEASE_TITLE.txt)"
          else
            TITLE="${REF_NAME}"
          fi
          echo "name=$TITLE" >> "$GITHUB_OUTPUT"

      # Overwrite the auto-generated release body with the human-edited changelog content
      - name: Update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          TITLE: ${{ steps.title.outputs.name }}
        run: |
          gh release edit "$REF_NAME" \
            --title "$TITLE" \
            --notes-file RELEASE_NOTES.md
